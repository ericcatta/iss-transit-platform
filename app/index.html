<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>ISS Transit Config</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 70vh;
      width: 100%;
    }

    .panel {
      padding: 15px;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <div class="panel">
    <p><b>Lat:</b> <span id="lat">-</span></p>
    <p><b>Lon:</b> <span id="lon">-</span></p>

    <button onclick="generateConfig()">Genera config.json</button>

    <pre id="output"></pre>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script>
    // Inizializza mappa (centrata su Europa)
    const map = L.map('map').setView([46.8, 8.3], 7);

    // Tile OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let marker = null;
    let selectedLat = null;
    let selectedLon = null;

    // Click sulla mappa
    map.on('click', function(e) {
      selectedLat = e.latlng.lat;
      selectedLon = e.latlng.lng;

      // Aggiorna UI
      document.getElementById("lat").innerText = selectedLat.toFixed(6);
      document.getElementById("lon").innerText = selectedLon.toFixed(6);

      // Marker
      if (marker) {
        map.removeLayer(marker);
      }

      marker = L.marker([selectedLat, selectedLon]).addTo(map);
    });

    function generateConfig() {
      if (selectedLat === null) {
        alert("Clicca sulla mappa prima!");
        return;
      }

      const config = {
        users: [
          {
            lat: selectedLat,
            lon: selectedLon,
            radius_km: 40,
            grid_step_km: 5,
            search_hours: 24
          }
        ]
      };

      document.getElementById("output").innerText =
        JSON.stringify(config, null, 2);
    }
  </script>

</body>
</html>
